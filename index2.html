<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<style>
.circle {
    width: 300px;
    height: 300px;
    margin: 100px auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: bold;

    background: radial-gradient(
        circle,
        white 0 50px,
        yellow 50px 90px,
        blue 120px 200px
    );
}
body {
    background: #ccc;
}
</style>
</head>
<body>

<div class="circle">UA</div>

</body>
</html>
